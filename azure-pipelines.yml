trigger:
  branches:
    include:
      - dev
      - main

resources:
 - repo: self

variables:
  linuxImageName: ubuntu-latest
  windowsImageName: windows-latest
  imageRepository: stocksappwebapi
  tag: $(Build.BuildId)
  resourceGroupServiceConnectionName: stocksapp-rgServiceConnection
  keyVaultName: kv-stocksapp
  buildContext: $(Build.SourcesDirectory)/StocksAppSolution
  dockerFilePath: $(Build.SourcesDirectory)/StocksAppSolution/StocksApp.WebApi/Dockerfile
  acrName: stocksapp-acrServiceConnection

stages:
  - stage: InitializeKeyVault
    displayName: Initialize key vault
    jobs:
    - job: FetchSecrets
      displayName: Fetch secrets from Key Vault
      pool:
        vmImage: $(linuxImageName)
      steps:
        - task: AzureKeyVault@2
          displayName: Fetch Key Vault secrets
          inputs:
            azureSubscription: $(resourceGroupServiceConnectionName)
            keyVaultName: $(keyVaultName)
            SecretsFilter: '*'
            RunAsPreJob: true

  - stage: Build
    displayName: Build and push stage
    jobs:
      - job: Build
        displayName: Build
        steps:
          - task: Docker@2
            displayName: Build docker image
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: $(dockerFilePath)
              buildContext: $(buildContext)
              containerRegistry: $(acrName)
              tags: |
                $(tag)
  - stage: Test
    displayName: Test and publish results stage
    jobs:
      - job: RunTest
        displayName: Run unit and integration tests
        pool:
          vmImage: $(linuxImageName) 
        steps:
          - task: DotNetCoreCLI@2
            displayName: Restore NuGet Packages
            inputs:
              command: 'restore'
              projects: '$(Build.SourcesDirectory)/StocksAppSolution/*.sln'

          - task: DotNetCoreCLI@2
            displayName: Run Tests
            inputs:
              command: 'test'
              # Finds any project file ending with Tests/test in its name
              projects: |
                $(Build.SourcesDirectory)/StocksAppSolution/StocksApp.Test/*.csproj
                $(Build.SourcesDirectory)/StocksAppSolution/StocksApp.IntegrationTests/*.csproj
              arguments: '--configuration Release --collect:"XPlat Code Coverage"'