services:
  stocksapp.webapi:
    image: stocksappwebapi:dev
    build:
      context: .
      dockerfile: StocksApp.WebApi/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - POSTGRES_HOST=postgres-container
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=stocksappdb
    ports:
      - "8088:8080"
    networks:
      - stocksapp-network

  postgres-container:
    image: postgres:15.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stocksappdb
    ports:
      - "5434:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - stocksapp-network

networks:
  stocksapp-network:
    driver: bridge